<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Business Manager Pro</title>
    <!-- Font Awesome 6 (مجاني) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-chart-pie logo-icon"></i>
                    <h1>Business Manager <span>Pro</span></h1>
                </div>
                <p class="subtitle"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول إلى لوحة التحكم</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" required autofocus>
                    <i class="fas fa-user input-icon"></i>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> <i class="fas fa-check-circle"></i> تذكرني
                    </label>
                    <a href="#" class="forgot-link"><i class="fas fa-key"></i> نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
                <div id="loginError" class="error-message" style="display:none;"></div>
            </form>
            <div class="login-footer">
                <p><i class="fas fa-copyright"></i> 2026 Business Manager Pro - جميع الحقوق محفوظة</p>
            </div>
        </div>
    </div>

    <script src="../js/renderer.js"></script>
</body>
</html>
